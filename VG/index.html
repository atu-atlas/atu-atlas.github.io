## Menus

- `openmenu mainlockoutmenu`
- `openmenu mainmenuoffline`
- `openmenu systemlinklobby`

## DVARs
Multi-purpose commands

- `execution_hint_enabled`
This will show/hide a hint whenever you're able to perform an execution, the UI elements for controller are unfinished in this game (0-1)
- `lui_showBuildAndServerText`
Hides the top right watermark on menus. NOT RECOMMENDED FOR PLAYERS WITH TECH ISSUES, (0-1)
- `lui_cod_points_enabled`
This will show/hide COD Points in menus (0-1)

## Inventories
- `setPrivateLoadout loadouts 0 name`
Example: *setPrivateLoadout loadouts 0 name "New meta, chat"*
- `setPrivateLoadout loadouts 0 weaponSetups 0 weapon`
Example: *setPrivateLoadout loadouts 0 weaponSetups 0 weapon s4_ar_stango44*
- `setPrivateLoadout loadouts 0 weaponSetups 0 camo`
Example: *setPrivateLoadout loadouts 0 weaponSetups 0 camo s4_camo_11a*
